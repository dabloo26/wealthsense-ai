name: Weekly Retraining

on:
  schedule:
    - cron: "0 12 * * 0"
  workflow_dispatch:

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run training
        env:
          PYTHONPATH: src
        run: python -m wealthsense_ai.train

      - name: Drift check and promotion gate
        env:
          PYTHONPATH: src
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          p = Path("artifacts/metrics.json")
          if not p.exists():
              raise SystemExit("metrics.json not found")
          data = json.loads(p.read_text())
          rows = data.get("results", [])
          ensembles = [r for r in rows if r.get("model") == "ensemble"]
          if not ensembles:
              raise SystemExit("No ensemble metrics; fail promotion gate")
          avg_dacc = sum(float(r.get("directional_accuracy", 0.0)) for r in ensembles) / len(ensembles)
          print(f"avg_ensemble_directional_accuracy={avg_dacc:.4f}")
          if avg_dacc < 0.52:
              raise SystemExit("Promotion blocked: ensemble directional accuracy below 0.52")
          print("Promotion gate passed")
          PY

      - name: Upload training artifacts
        uses: actions/upload-artifact@v4
        with:
          name: retrain-artifacts
          path: artifacts/
